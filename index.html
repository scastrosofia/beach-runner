<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Runner</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
  canvas { display: block; }
  #scoreDisplay {
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: clamp(18px, 3vw, 36px);
    font-family: 'Comic Sans MS', cursive;
    color: #ff00aa;
    text-shadow: 0 0 10px #ff00aa;
    z-index: 100;
    max-width: 45vw;
    pointer-events: none;
    user-select: none;
  }

  #livesDisplay {
    position: fixed;
    top: 16px;
    left: 20px;
    font-size: clamp(18px, 3vw, 36px);
    z-index: 100;
    max-width: 45vw;
    pointer-events: none;
    user-select: none;
  }
  #gameOver {
    position: fixed; inset: 0; z-index: 20;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7);
    text-align: center;
  }
  #gameOver.show { display: flex; }
  #gameOver h1 { font-size: 56px; color: #ff00aa; margin: 0 0 10px;
    text-shadow: 0 0 20px #ff00aa, 0 0 60px #ff00aa88; }
  #gameOver p { font-size: 24px; color: #fff; margin: 8px 0; }
  #gameOver button {
    margin-top: 24px; padding: 14px 48px; font-size: 22px;
    background: #ff00aa; color: #fff; border: none; border-radius: 8px;
    cursor: pointer; transition: transform 0.15s;
    box-shadow: 0 0 20px #ff00aa88;
  }
  #gameOver button:hover { transform: scale(1.08); }
  #gameOver button:active { transform: scale(0.96); }

  @keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-80px); }
  }
  * {
    font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
    color: #ff00aa !important;
  }
  #scoreDisplay, #livesDisplay, #gameOverScreen, #gameOverScreen * {
    font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
    color: #ff00aa !important;
    text-shadow: 0 0 10px #ff00aa;
  }
  @keyframes pulse {
    0%,100%{opacity:1}
    50%{opacity:0.5}
  }
</style>
</head>
<body>
<div id="ui">
  <div id="scoreDisplay">0</div>  <div id="livesDisplay">❤️❤️❤️</div>
</div>

<div id="loadingScreen" style="
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: transparent;
  z-index: 500; pointer-events: none;
">
  <div style="
    font-family: 'Comic Sans MS', cursive;
    color: #ff00aa;
    font-size: 48px;
    text-shadow: 0 0 20px #ff00aa;
    margin-bottom: 40px;
    animation: pulse 1s infinite;
  ">loading...</div>

  <div style="
    font-family: 'Comic Sans MS', cursive;
    color: #ff00aa;
    font-size: 28px;
    text-shadow: 0 0 10px #ff00aa;
    text-align: center;
    line-height: 2;
  ">
    Dos reglas:<br>
    1- hacete millonaria 🤑<br>
    2- esquivá la pala 🪛
  </div>
  <div id="startPrompt" style="
    font-family: 'Comic Sans MS', cursive;
    color: #ff00aa;
    font-size: 36px;
    text-shadow: 0 0 15px #ff00aa;
    margin-top: 50px;
    animation: pulse 0.8s infinite;
  ">▶ Apretá START</div>
</div>

<div id="gameOver">
  <h1>GAME OVER</h1>
  <p>Score: <span id="finalScore">0</span></p>
  <button id="restartBtn" style="color: white !important; text-shadow: 0 0 10px white;">Dale de vuelta</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",

</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Constants ─────────────────────────────────────────────────
const MOVE_SPEED = 5;
const MAX_COINS = 15;
const MAX_SHOVELS = 4;
const SHOVEL_SCALE_TARGET = 300;
const GROUND_Y = 0;
const JUMP_VY = 15;
const GRAVITY = 0.8;
const COLLIDE_DIST = 1;
const INVINCIBILITY_TIME = 2;
const FLASH_INTERVAL = 10;

// ─── Paths ──────────────────────────────────────────────────────
const CHAR_PATH = 'character/Meshy_AI_Colorful_Braided_Doll_biped_color/Meshy_AI_Colorful_Braided_Doll_biped/Meshy_AI_Colorful_Braided_Doll_biped_Character_output.glb';
const WALK_ANIM_PATH = 'character/Meshy_AI_Colorful_Braided_Doll_biped_color/Meshy_AI_Colorful_Braided_Doll_biped/Meshy_AI_Colorful_Braided_Doll_biped_Animation_Walking_withSkin.glb';
const RUN_ANIM_PATH = 'character/Meshy_AI_Colorful_Braided_Doll_biped_color/Meshy_AI_Colorful_Braided_Doll_biped/Meshy_AI_Colorful_Braided_Doll_biped_Animation_Running_withSkin.glb';
const JUMP_ANIM_PATH = 'character/Meshy_AI_Colorful_Braided_Doll_biped_color/Meshy_AI_Colorful_Braided_Doll_biped/Meshy_AI_Colorful_Braided_Doll_biped_Animation_Run_Jump_and_Roll_withSkin.glb';
const DANCE_ANIM_PATH = 'character/Meshy_AI_Colorful_Braided_Doll_biped-dance/Meshy_AI_Colorful_Braided_Doll_biped/Meshy_AI_Colorful_Braided_Doll_biped_Animation_Shake_It_Off_Dance_withSkin.glb';
const SAND_TEX_PATH = 'assets/sand_color.png';
const WATER_TEX_PATH = 'ocean-water-cross-section-2026-02-06-06-44-23-utc/Extras/Water_CS_V2_BaseColor.png';
const SHOVEL_PATHS = [
  'assets/spade.glb',
  'shovel-2026-02-08-22-55-28-utc/Spade.glb'
];

// ─── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.tabIndex = 0;
document.body.prepend(renderer.domElement);

// ─── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// ─── Camera ────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 300, -600);
camera.lookAt(0, 0, 0);

// ─── Lighting ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 3);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

// ─── Sun ────────────────────────────────────────────────────────
const sunGeo = new THREE.SphereGeometry(80, 16, 16);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.position.set(500, 800, -2000);
scene.add(sun);

// ─── Palm Trees ─────────────────────────────────────────────────
let palmTemplate = null;
function loadPalms() {
  const loader = new GLTFLoader();
  loader.load('assets/palm.glb', (gltf) => {
    palmTemplate = gltf.scene;
    console.log('palm trees loaded');

    // Scale to 600 units tall
    const box = new THREE.Box3().setFromObject(palmTemplate);
    const height = box.max.y - box.min.y;
    palmTemplate.scale.setScalar(600 / height);

    // Compute base offset so palm sits at y=0
    palmTemplate.updateMatrixWorld(true);
    const scaledBox = new THREE.Box3().setFromObject(palmTemplate);
    const baseOffset = -scaledBox.min.y;

    // Place 8 clones randomly at edges of the map
    for (let i = 0; i < 8; i++) {
      const palm = palmTemplate.clone();
      const x = (Math.random() - 0.5) * 5000;
      const z = (Math.random() - 0.5) * 5000;
      palm.position.set(x, baseOffset, z);
      palm.rotation.y = Math.random() * Math.PI * 2;
      scene.add(palm);
    }
  }, undefined, (err) => {
    console.log('palm error:', err);
    // Fallback: simple cone + cylinder palm trees
    for (let i = 0; i < 8; i++) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(8, 12, 80, 8),
        new THREE.MeshStandardMaterial({ color: 0x8B4513 })
      );
      const x = (Math.random() - 0.5) * 5000;
      const z = (Math.random() - 0.5) * 5000;
      trunk.position.set(x, 40, z);

      const fronds = new THREE.Mesh(
        new THREE.ConeGeometry(40, 60, 8),
        new THREE.MeshStandardMaterial({ color: 0x228B22 })
      );
      fronds.position.set(0, 80, 0);
      trunk.add(fronds);
      scene.add(trunk);
    }
    console.log('palm trees fallback created');
  });
}
loadPalms();

// ─── Beach Umbrellas ────────────────────────────────────────────
for (let i = 0; i < 3; i++) {
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 8, 6),
    new THREE.MeshStandardMaterial({ color: 0xD2B48C })
  );
  const umbrellaX = -600 - Math.random() * 300;
  const umbrellaZ = -300 - Math.random() * 1200;
  pole.position.set(umbrellaX, 4, umbrellaZ);

  const canopy = new THREE.Mesh(
    new THREE.ConeGeometry(8, 2.5, 8),
    new THREE.MeshStandardMaterial({ color: 0xFF7F7F })
  );
  canopy.position.set(0, 8, 0);
  pole.add(canopy);
  scene.add(pole);
}

// ─── Helpers ───────────────────────────────────────────────────
const loader = new GLTFLoader();
const texLoader = new THREE.TextureLoader();
const clock = new THREE.Clock();

const _v3 = new THREE.Vector3();
const LOADING_CAM_POS = new THREE.Vector3(200, 400, 800);
let frameCount = 0;

// ─── Ground ────────────────────────────────────────────────────
// Start with fallback beige color — textures upgrade asynchronously
const groundMat = new THREE.MeshStandardMaterial({ color: 0xc2a05a });
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(8000, 8000),
  groundMat
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, 0, 0);
ground.receiveShadow = true;
scene.add(ground);

// Load sand textures asynchronously (non-blocking)
function loadSandTex(url, prop) {
  texLoader.load(url, (tex) => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(80, 80);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    groundMat[prop] = tex;
    groundMat.needsUpdate = true;
    console.log('sand load success');
  }, undefined, (err) => {
    console.log('sand load error:', err);
    // Keep fallback color
  });
}
loadSandTex('assets/sand_color.png', 'map');
loadSandTex('assets/sand_normal.png', 'normalMap');
loadSandTex('assets/sand_rough.png', 'roughnessMap');

// ─── Ocean ─────────────────────────────────────────────────────
let waterTex = null;
const oceanMat = new THREE.MeshStandardMaterial({ color: 0x3a8fc2, roughness: 0.2, metalness: 0.1 });
const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(1500, 2000),
  oceanMat
);
ocean.rotation.x = -Math.PI / 2;
ocean.position.set(1800, -10, 0);
scene.add(ocean);

texLoader.load(WATER_TEX_PATH, (tex) => {
  waterTex = tex;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(10, 20);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  oceanMat.map = tex;
  oceanMat.needsUpdate = true;
  console.log('water tex loaded');
}, undefined, (err) => {
  console.log('water tex error:', err);
  // Keep fallback blue color
});

// ─── Game State ────────────────────────────────────────────────
const game = {
  started: false,
  gameOver: false,
  score: 0,
  lives: 3,
  invincibleUntil: 0,
  elapsed: 0,
  lastCoinSpawn: 0,
  lastShovelSpawn: 0,
  flashFrames: 0
};

// ─── Player ────────────────────────────────────────────────────
const player = { x: 0, y: 0, z: 0, vy: 0, jumping: false, invincible: false };
let onGround = true;
const keys = { up: false, down: false, left: false, right: false };
const gpKeys = { up: false, down: false, left: false, right: false };
let gamepadConnected = false;
let jumpButtonPressed = false;
let selectButtonPressed = false;
const character = new THREE.Group();
character.position.set(0, 0, 0);
scene.add(character);

// ─── Animation State ───────────────────────────────────────────
let mixer = null;
let walkAction = null;
let runAction = null;
let jumpAction = null;
let animState = 'walk';
let characterReady = false;
let animationsReady = false;
let jumpTimer = 0;
let jumpDuration = 0;
let prevMoving = false;
let danceAction = null;
let isDancing = false;
let danceDiv = null;

// ─── Spawned Objects ──────────────────────────────────────────
const shovels = [];
const coins = [];
const particles = [];

let gameCanStart = false;
let characterFallback = false;
let shovelsStarted = false;

// ─── Load Character ──────────────────────────────────────────
loader.load(CHAR_PATH, (gltf) => {
  const model = gltf.scene;

  // Fixed scale
  model.scale.setScalar(103);
  scene.add(model);
  model.updateMatrixWorld(true);

  // Compute bounding box to position bottom at Y=0
  const box = new THREE.Box3().setFromObject(model);
  model.position.y = -box.min.y;
  model.position.z = 0;
  model.rotation.y = 0;

  // Reparent to character group
  scene.remove(model);
  character.add(model);

  // Shadows
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Create mixer
  mixer = new THREE.AnimationMixer(model);
  console.log('character model loaded');

  // Load animations in background (non-blocking)
  let animsLoaded = 0;
  const animsTotal = 3;

  function onAnimLoaded(name, path, callback) {
    loader.load(path, (animGltf) => {
      const clip = animGltf.animations[0];
      if (clip) {
        if (name === 'jump') {
          clip.tracks = clip.tracks.filter(track => !track.name.includes('position'));
        }
        const action = mixer.clipAction(clip);
        callback(action);
        console.log('animation loaded:', name);
      } else {
        console.warn('No animation found in ' + path);
      }
      animsLoaded++;
      if (animsLoaded >= animsTotal) {
        animationsReady = true;
        setupEventListeners();
        if (walkAction) {
          walkAction.play();
          animState = 'walk';
        }
        console.log('all animations ready');
        const loadingText = document.querySelector('#loadingScreen div');
        if (loadingText) loadingText.textContent = '¡Listo!';
      }
    }, undefined, (err) => {
      console.log('animation error:', name, err);
      animsLoaded++;
      if (animsLoaded >= animsTotal) {
        animationsReady = true;
        setupEventListeners();
        if (walkAction) {
          walkAction.play();
          animState = 'walk';
        }
        console.log('all animations ready (with errors)');
        const loadingText = document.querySelector('#loadingScreen div');
        if (loadingText) loadingText.textContent = '¡Listo!';
      }
    });
  }

  onAnimLoaded('walk', WALK_ANIM_PATH, (act) => { walkAction = act; });
  onAnimLoaded('run', RUN_ANIM_PATH, (act) => { runAction = act; });
  onAnimLoaded('jump', JUMP_ANIM_PATH, (act) => { jumpAction = act; });

  // Load dance animation independently (doesn't block game start)
  loader.load(DANCE_ANIM_PATH, (gltf) => {
    const clip = gltf.animations[0];
    if (clip && mixer) {
      danceAction = mixer.clipAction(clip);
      console.log('dance animation loaded');
    } else {
      console.warn('no dance animation found');
    }
  }, undefined, (err) => {
    console.log('dance animation error:', err);
  });

  // Start game immediately — don't wait for animations
  startGame();

}, undefined, (err) => {
  console.log('character error:', err);
  // Placeholder fallback
  const geo = new THREE.BoxGeometry(30, 80, 30);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff00aa });
  const placeholder = new THREE.Mesh(geo, mat);
  placeholder.position.y = 40;
  character.add(placeholder);
  characterFallback = true;
  console.log('character fallback created');
  startGame();
});

function startGame() {
  if (gameCanStart) return;
  gameCanStart = true;
  renderer.domElement.focus();
  console.log('game started');
}

// ─── Load Shovel Obstacle ─────────────────────────────────────
let shovelTemplate = null;
let shovelScale = 1.2;

function tryLoadShovel(index) {
  if (index >= SHOVEL_PATHS.length) {
    console.warn('All shovel GLB paths failed. Creating geometry fallback.');
    console.log('ALL SHOVEL PATHS FAILED');
    shovelTemplate = new THREE.Group();

    const handleGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.8, 8);
    const handleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    handle.position.y = 0.4;
    shovelTemplate.add(handle);

    const bladeGeo = new THREE.BoxGeometry(0.3, 0.25, 0.02);
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    blade.position.set(0, 0.02, 0);
    shovelTemplate.add(blade);

    shovelScale = 1;
    return;
  }

  const path = SHOVEL_PATHS[index];
  loader.load(path, (gltf) => {
    shovelTemplate = gltf.scene;
    console.log('shovel template ready:', shovelTemplate);

    const box = new THREE.Box3().setFromObject(shovelTemplate);
    const height = box.max.y - box.min.y;
    shovelScale = SHOVEL_SCALE_TARGET / height;
    shovelTemplate.scale.setScalar(shovelScale);

    // Log bounding box height after scaling
    shovelTemplate.updateMatrixWorld(true);
    const scaledBox = new THREE.Box3().setFromObject(shovelTemplate);
    console.log('shovel scaled height:', scaledBox.max.y - scaledBox.min.y);

    // Apply pink color
    shovelTemplate.traverse((child) => {
      if (child.isMesh && child.material) {
        child.material = new THREE.MeshStandardMaterial({
          color: 0xffb3de,
          map: child.material.map || null
        });
        child.material.needsUpdate = true;
      }
    });

    // Reposition so bottom is at local Y=0 after scaling
    shovelTemplate.position.y = -scaledBox.min.y;
  }, undefined, (err) => {
    console.warn(`Failed to load shovel from ${path}:`, err);
    tryLoadShovel(index + 1);
  });
}

tryLoadShovel(0);

// ─── Load Money Bundle ────────────────────────────────────────
let moneyBundleTemplate = null;
let useCoinFallback = false;
const MONEY_BUNDLE_PATH = 'assets/money.glb';

loader.load(MONEY_BUNDLE_PATH, (gltf) => {
  moneyBundleTemplate = gltf.scene;
  console.log('money load success');

  // Compute bounding box and scale to 80 units tall
  const box = new THREE.Box3().setFromObject(moneyBundleTemplate);
  const height = box.max.y - box.min.y;
  const scale = 80 / height;
  moneyBundleTemplate.scale.setScalar(scale);

  // Load money texture and apply to all meshes
  const texLoader2 = new THREE.TextureLoader();
  texLoader2.load('assets/money.png', (moneyTex) => {
    moneyBundleTemplate.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshBasicMaterial({
          map: moneyTex,
          side: THREE.DoubleSide,
          color: 0xffffff,
          transparent: false
        });
      }
    });
    console.log('money texture applied');
  }, undefined, (err) => {
    console.log('money texture failed, using green:', err);
    moneyBundleTemplate.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshBasicMaterial({
          color: 0x85bb65,
          side: THREE.DoubleSide
        });
      }
    });
  });
}, undefined, (err) => {
  console.log('money load error:', err);
  useCoinFallback = true;
  console.log('money fallback enabled');
});


// ─── Spawn Coin ────────────────────────────────────────────────
const shadowGeo = new THREE.CylinderGeometry(50, 50, 2, 24);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 });

function spawnCoin() {
  if (coins.length >= MAX_COINS) return;

  const x = (Math.random() - 0.5) * 4000;
  const z = character.position.z - 500 - Math.random() * 1500;
  const baseY = 60;

  let coin;

  if (moneyBundleTemplate) {
    coin = moneyBundleTemplate.clone();
  } else if (useCoinFallback) {
    // Fallback: green bill placeholder
    const coinGeo = new THREE.BoxGeometry(40, 60, 10);
    const coinMat = new THREE.MeshStandardMaterial({ color: 0x00cc44 });
    coin = new THREE.Mesh(coinGeo, coinMat);
    coin.castShadow = true;
  } else {
    return; // Still loading — wait
  }
  coin.position.set(x, baseY, z);
  coin.userData.baseY = baseY;
  coin.userData.bobOffset = Math.random() * Math.PI * 2;

  // Enable shadows on all child meshes
  coin.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Fake shadow on ground directly below coin
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.position.set(x, 1, z);
  shadow.userData.coinRef = coin;
  coin.userData.shadowRef = shadow;
  scene.add(shadow);

  const light = new THREE.PointLight(0xFFD700, 1, 200);
  coin.add(light);

  scene.add(coin);
  coins.push(coin);
}

// ─── Spawn Coin Particles ──────────────────────────────────────
function spawnCoinParticles(position) {
  for (let i = 0; i < 6; i++) {
    const size = 3 + Math.random() * 3;
    const geo = new THREE.SphereGeometry(size, 6, 6);
    const mat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    const angle = (Math.PI * 2 * i) / 6;
    const speed = 0.5 + Math.random() * 0.5;
    mesh.userData.vx = Math.cos(angle) * speed;
    mesh.userData.vy = Math.sin(angle) * speed + 0.3;
    mesh.userData.vz = (Math.random() - 0.5) * 0.3;
    mesh.userData.life = 30;
    scene.add(mesh);
    particles.push(mesh);
  }
}

// ─── Spawn Shovel ──────────────────────────────────────────────
function spawnShovel() {
  console.log('spawnShovel called, shovelTemplate:', shovelTemplate, 'shovels.length:', shovels.length, 'MAX_SHOVELS:', MAX_SHOVELS);
  if (!shovelTemplate) return;
  if (shovels.length >= MAX_SHOVELS) return;

  const x = character.position.x + (Math.random() - 0.5) * 200;
  const z = character.position.z - 150;
  console.log('character pos:', character.position.x, character.position.z, 'shovel pos:', x, z);

  const shovel = shovelTemplate.clone(true);
  shovel.position.set(x, 0, z);
  shovel.traverse(child => {
    if (child.isMesh) {
      child.material = new THREE.MeshBasicMaterial({
        color: 0xff00aa,
        side: THREE.DoubleSide
      });
    }
  });
  shovel.userData.rotSpeed = 0.5 + Math.random() * 0.5;
  scene.add(shovel);
  shovel.updateMatrixWorld(true);
  const shovelBox = new THREE.Box3().setFromObject(shovel);
  shovel.position.y = -shovelBox.min.y;
  shovels.push(shovel);
  console.log('shovel spawned at:', shovel.position.x, shovel.position.y, shovel.position.z);
}

// ─── Jump Helper ────────────────────────────────────────────────
function doJump() {
  if (isDancing) return;
  console.log('jump pressed, jumpAction:', jumpAction);
  console.log('jumpAction isRunning:', jumpAction ? jumpAction.isRunning() : 'N/A');
  if (!onGround) return;
  if (!jumpAction) return;

  console.log('jump clip duration:', jumpAction._clip.duration);

  player.vy = JUMP_VY;
  player.jumping = true;
  jumpTimer = 0;
  jumpDuration = jumpAction._clip.duration;

  // Stop current animation immediately
  if (walkAction) walkAction.stop();
  if (runAction) runAction.stop();

  // Prepare runAction for crossfade
  runAction.reset().play();

  // Set up jumpAction
  jumpAction.reset();
  jumpAction.clampWhenFinished = true;
  jumpAction.loop = THREE.LoopOnce;

  // Crossfade from runAction to jumpAction in 0.1s
  runAction.fadeOut(0.1);
  jumpAction.fadeIn(0.1).play();

  animState = 'jump';
}

// ─── Dance ──────────────────────────────────────────────────────
function startDance() {
  if (isDancing) return;
  isDancing = true;

  // Stop current animations
  if (walkAction) walkAction.fadeOut(0.2);
  if (runAction) runAction.fadeOut(0.2);
  if (jumpAction) jumpAction.stop();
  if (player.jumping) {
    player.jumping = false;
    player.vy = 0;
  }

  // Play dance on loop
  danceAction.reset();
  danceAction.loop = THREE.LoopRepeat;
  danceAction.fadeIn(0.2).play();

  animState = 'dance';

  // Show DANCE div
  danceDiv = document.createElement('div');
  danceDiv.textContent = 'DANCE';
  danceDiv.style.cssText = `
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Comic Sans MS', cursive, sans-serif;
    font-size: 100px;
    color: #ff00aa;
    text-shadow: 0 0 20px #ff00aa;
    z-index: 100;
    pointer-events: none;
    animation: pulse 1s ease-in-out infinite;
  `;
  document.body.appendChild(danceDiv);

  console.log('dance started');
}

function stopDance() {
  if (!isDancing) return;
  isDancing = false;

  // Fade out dance
  if (danceAction) danceAction.fadeOut(0.2);

  // Resume walk/run based on movement
  const isMoving = keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS'] || keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || gpKeys.up || gpKeys.down || gpKeys.left || gpKeys.right;
  if (isMoving && runAction) {
    runAction.reset().fadeIn(0.2).play();
    animState = 'run';
    prevMoving = true;
  } else if (walkAction) {
    walkAction.reset().fadeIn(0.2).play();
    animState = 'walk';
    prevMoving = false;
  }

  // Remove DANCE div
  if (danceDiv) {
    danceDiv.remove();
    danceDiv = null;
  }

  console.log('dance stopped');
}

// ─── Controls ─────────────────────────────────────────────────

// ─── Gamepad Polling ───────────────────────────────────────────
function pollGamepad() {
  const gamepads = navigator.getGamepads();
  const gp = gamepads[0];

  // Reset gamepad-derived keys each frame
  gpKeys.up = false;
  gpKeys.down = false;
  gpKeys.left = false;
  gpKeys.right = false;

  if (!gp) return;

  if (!gamepadConnected) {
    gamepadConnected = true;
    console.log('gamepad connected:', gp.id);
  }

  const TH = 0.3;

  // Axis 0: left/right
  if (gp.axes[0] < -TH) gpKeys.left = true;
  if (gp.axes[0] > TH) gpKeys.right = true;

  // Axis 1: forward/backward
  if (gp.axes[1] < -TH) gpKeys.up = true;
  if (gp.axes[1] > TH) gpKeys.down = true;

  // Button 9 = Start on most generic gamepads
  // Also try buttons 8, 9, 10 to cover different mappings
  const startPressed = gp.buttons[9]?.pressed || gp.buttons[8]?.pressed || gp.buttons[10]?.pressed;
  if (startPressed && !game.started) {
    startGameplay();
    console.log('game started via gamepad Start button');
  }

  // Button 0: dance (A button)
  const dancePressed = gp.buttons[0]?.pressed;
  if (dancePressed && !isDancing && danceAction) {
    startDance();
  } else if (!dancePressed && isDancing) {
    stopDance();
  }

  // Button 2 or 3: jump
  const jumpPressed = gp.buttons[2]?.pressed || gp.buttons[3]?.pressed;
  if (jumpPressed && !jumpButtonPressed) doJump();
  jumpButtonPressed = jumpPressed;

  // Button 8: Select/Back
  const selectPressed = gp.buttons[8]?.pressed;
  if (selectPressed && !selectButtonPressed) {
    console.log('SELECT pressed, gameOver:', game.gameOver, 'started:', game.started);
    if (game.gameOver) {
      location.reload();
    } else if (!game.started) {
      startGameplay();
    }
  }
  selectButtonPressed = selectPressed ?? false;
}

function onKeyDown(e) {
  console.log('KEY:', e.code);
  if (game.gameOver) return;

  if (!game.started) {
    startGameplay();
  }

  if (e.key === 'ArrowUp') {
    keys['ArrowUp'] = true;
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    keys['ArrowDown'] = true;
    e.preventDefault();
  } else if (e.key === 'ArrowLeft') {
    keys['ArrowLeft'] = true;
    e.preventDefault();
  } else if (e.key === 'ArrowRight') {
    keys['ArrowRight'] = true;
    e.preventDefault();
  } else if (e.key === 'w' || e.key === 'W') {
    keys['KeyW'] = true;
    e.preventDefault();
  } else if (e.key === 's' || e.key === 'S') {
    keys['KeyS'] = true;
    e.preventDefault();
  } else if (e.key === 'a' || e.key === 'A') {
    keys['KeyA'] = true;
    e.preventDefault();
  } else if (e.key === 'd' || e.key === 'D') {
    keys['KeyD'] = true;
    e.preventDefault();
  } else if (e.key === ' ') {
    e.preventDefault();
    doJump();
  } else if (e.key === 'f' || e.key === 'F') {
    keys['KeyF'] = true;
    e.preventDefault();
    if (!isDancing && danceAction) {
      startDance();
    }
  }
}

function onKeyUp(e) {
  if (e.key === 'ArrowUp') {
    keys['ArrowUp'] = false;
  } else if (e.key === 'ArrowDown') {
    keys['ArrowDown'] = false;
  } else if (e.key === 'ArrowLeft') {
    keys['ArrowLeft'] = false;
  } else if (e.key === 'ArrowRight') {
    keys['ArrowRight'] = false;
  } else if (e.key === 'w' || e.key === 'W') {
    keys['KeyW'] = false;
  } else if (e.key === 's' || e.key === 'S') {
    keys['KeyS'] = false;
  } else if (e.key === 'a' || e.key === 'A') {
    keys['KeyA'] = false;
  } else if (e.key === 'd' || e.key === 'D') {
    keys['KeyD'] = false;
  } else if (e.key === 'f' || e.key === 'F') {
    keys['KeyF'] = false;
    if (isDancing) {
      stopDance();
    }
  }
}

function onClick(e) {
  if (game.gameOver) return;

  if (!game.started) {
    startGameplay();
  }
  doJump();
}

function setupEventListeners() {
  document.removeEventListener('keydown', onKeyDown);
  document.removeEventListener('keyup', onKeyUp);
  document.removeEventListener('click', onClick);
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('click', onClick);
}

setupEventListeners();

// ─── Start Gameplay (transition from loading screen) ───────────
function startGameplay() {
  if (game.started) return;
  game.started = true;
  document.getElementById('loadingScreen').style.display = 'none';

  // Stop loading dance and transition to walk/run
  if (isDancing) {
    if (danceAction) danceAction.fadeOut(0.2);
    isDancing = false;
    if (walkAction) {
      walkAction.reset().fadeIn(0.2).play();
    }
    animState = 'walk';
    prevMoving = false;
  }

  console.log('gameplay started');
}

// ─── Restart ───────────────────────────────────────────────────
document.getElementById('restartBtn').addEventListener('click', () => {
  location.reload();
});

// ─── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Update UI ────────────────────────────────────────────────
function updateUI() {
  document.getElementById('scoreDisplay').textContent = game.score;
  const hearts = '❤️'.repeat(Math.max(0, game.lives));
  document.getElementById('livesDisplay').textContent = hearts || '💀';
}

// ─── Collection Text ──────────────────────────────────────────
function showCollectionText() {
  const el = document.createElement('div');
  el.textContent = '\u00a1Soy una rana!';
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(32px,6vw,80px);color:#ff00aa;font-weight:bold;text-shadow:0 0 20px #ff00aa;font-family:\'Comic Sans MS\',cursive;pointer-events:none;z-index:100;animation:floatUp 1.5s ease-out forwards;';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// ─── Smooth Angle Lerp ─────────────────────────────────────────
function lerpAngle(current, target, t) {
  let diff = target - current;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  return current + diff * t;
}

// ─── Game Loop ─────────────────────────────────────────────────
function update() {
  const delta = clock.getDelta();
  const dt = delta * 60;

  game.elapsed += delta;
  frameCount++;

  // ── Input check debug (every 60 frames) ──
  if (frameCount % 60 === 0) {
    console.log('input check running');
    const gp = navigator.getGamepads()[0];
    if (gp) {
      gp.buttons.forEach((btn, i) => {
        if (btn.pressed) console.log('button pressed:', i, 'value:', btn.value);
      });
      gp.axes.forEach((axis, i) => {
        if (Math.abs(axis) > 0.2) console.log('axis:', i, 'value:', axis.toFixed(2));
      });
    }
  }

  // Animate water texture
  if (waterTex) {
    waterTex.offset.y -= 0.0003 * dt;
  }

  // ── Poll Gamepad (runs every frame including before game starts, for Start button) ──
  pollGamepad();

  if (!game.started || game.gameOver) {
    if (!game.started) {
      // Loading screen: fixed camera showing character and palm tree
      camera.position.lerp(LOADING_CAM_POS, 0.05);
      camera.lookAt(0, 150, 0);

      // Play dance on loop during loading screen
      if (danceAction && !isDancing) {
        // Stop current animations
        if (walkAction) walkAction.stop();
        if (runAction) runAction.stop();
        if (jumpAction) jumpAction.stop();
        if (player.jumping) { player.jumping = false; player.vy = 0; }

        danceAction.reset();
        danceAction.loop = THREE.LoopRepeat;
        danceAction.fadeIn(0.2).play();
        isDancing = true;
        animState = 'dance';
      }
    } else {
      // Game over: camera follows character
      _v3.set(
        character.position.x,
        character.position.y + 300,
        character.position.z - 600
      );
      camera.position.lerp(_v3, 0.05);
      camera.lookAt(character.position);
    }

    if (mixer) {
      mixer.update(delta);
    }
    renderer.render(scene, camera);
    requestAnimationFrame(update);
    return;
  }

  // ── Player Movement ──
  if (!isDancing) {
    const speed = 10;
    let targetRotation = character.rotation.y;
    if (keys['ArrowUp'] || keys['KeyW'] || gpKeys.up) {
      character.position.z -= speed;
      targetRotation = Math.PI;
    }
    if (keys['ArrowDown'] || keys['KeyS'] || gpKeys.down) {
      character.position.z += speed;
      targetRotation = 0;
    }
    if (keys['ArrowLeft'] || keys['KeyA'] || gpKeys.left) {
      character.position.x -= speed;
      targetRotation = -Math.PI / 2;
    }
    if (keys['ArrowRight'] || keys['KeyD'] || gpKeys.right) {
      character.position.x += speed;
      targetRotation = Math.PI / 2;
    }
    // Clamp player position within ground bounds
    character.position.x = Math.max(-3500, Math.min(3500, character.position.x));
    character.position.z = Math.max(-3500, Math.min(3500, character.position.z));

    character.rotation.y += (targetRotation - character.rotation.y) * 0.15;

    // ── Player Jump Physics ──
    if (player.jumping) {
      // Push character forward in the direction it faces during jump
      character.position.x += Math.sin(character.rotation.y) * 8;
      character.position.z += Math.cos(character.rotation.y) * 8;

      jumpTimer += delta;
      player.vy -= GRAVITY * dt;
      player.y += player.vy * dt;
      if (player.y < GROUND_Y && jumpTimer < jumpDuration) {
        // Keep at ground level while the roll animation finishes
        player.y = 0;
        player.vy = 0;
      }
      if (player.y <= GROUND_Y && player.vy <= 0 && jumpTimer >= jumpDuration) {
        player.y = 0;
        player.vy = 0;
        player.jumping = false;
        // Crossfade jump → run or walk
        if (animState === 'jump' && jumpAction) {
          jumpAction.fadeOut(0.2);
          const isMoving = keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS'] || keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || gpKeys.up || gpKeys.down || gpKeys.left || gpKeys.right;
          if (isMoving && runAction) {
            runAction.reset().fadeIn(0.2).play();
          } else if (walkAction) {
            walkAction.reset().fadeIn(0.2).play();
          }
          prevMoving = isMoving;
          animState = 'walk';
        }
      }
    }

    character.position.y = player.y;

    // ── Ground Check ──
    onGround = player.y <= GROUND_Y + 0.1;
  }

  // ── Animation (run vs walk) ──
  if (animState !== 'jump' && !isDancing) {
    const isMoving = keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS'] || keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || gpKeys.up || gpKeys.down || gpKeys.left || gpKeys.right;
    if (isMoving && !prevMoving) {
      // Started moving — crossfade to run
      if (walkAction) walkAction.fadeOut(0.2);
      if (runAction) runAction.reset().fadeIn(0.2).play();
      animState = 'run';
    } else if (!isMoving && prevMoving) {
      // Stopped moving — crossfade back to walk
      if (runAction) runAction.fadeOut(0.2);
      if (walkAction) walkAction.reset().fadeIn(0.2).play();
      animState = 'walk';
    }
    prevMoving = isMoving;
  }

  // ── Mixer Update ──
  if (mixer) {
    mixer.update(delta);
  }

  // ── Spawning ──
  if (game.started) {
    const gameTime = game.elapsed;
    if (gameTime - game.lastCoinSpawn > 0.8) {
      spawnCoin();
      game.lastCoinSpawn = gameTime;
    }
    if (shovelsStarted && gameTime - game.lastShovelSpawn > 3) {
      spawnShovel();
      game.lastShovelSpawn = gameTime;
    }
  }

  // ── Update Coins ──
  for (let i = coins.length - 1; i >= 0; i--) {
    const coin = coins[i];
    coin.rotation.y += 0.02;
    // Clamp bundle above ground and bob up/down
    coin.position.y = coin.userData.baseY + Math.sin(game.elapsed * 2 + coin.userData.bobOffset) * 15;
    coin.position.y = Math.max(60, coin.position.y);

    // Update fake shadow to follow coin x,z at ground level
    const shadow = coin.userData.shadowRef;
    if (shadow) {
      shadow.position.x = coin.position.x;
      shadow.position.z = coin.position.z;
    }

    // Collection
    const dist = character.position.distanceTo(coin.position);
    console.log('coin dist:', dist.toFixed(0));
    if (dist < 200) {
      game.score++;
      console.log('score:', game.score);
      updateUI();
      showCollectionText();
      spawnCoinParticles(coin.position.clone());

      // Show shovel warning sign when score reaches 3
      console.log('shovelsStarted value:', shovelsStarted, 'score:', game.score);
      if (game.score >= 3 && !shovelsStarted) {
        shovelsStarted = true;
        console.log('showing shovel sign');
        const sign = document.createElement('div');
        sign.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          font-size: clamp(32px, 6vw, 80px);
          font-weight: bold;
          color: #ff00aa;
          text-shadow: 0 0 30px #ff00aa;
          z-index: 9999;
          pointer-events: none;
          font-family: 'Comic Sans MS', cursive;
          text-align: center;
        `;
        sign.textContent = '\u00a1HAY QUE ESQUIVAR LA PALA!';
        document.body.appendChild(sign);
        setTimeout(() => sign.remove(), 3000);
      }

      if (shadow) scene.remove(shadow);
      scene.remove(coin);
      coins.splice(i, 1);
    }
  }

  // ── Update Shovels ──
  for (let i = shovels.length - 1; i >= 0; i--) {
    const shovel = shovels[i];
    shovel.rotation.y += 0.02;
    const dist = character.position.distanceTo(shovel.position);
    console.log('shovel dist:', dist.toFixed(0));
    if (dist < 150 && !player.invincible) {
      game.lives--;
      updateUI();
      player.invincible = true;
      setTimeout(() => { player.invincible = false; }, 2000);
      // Flash character
      let flashes = 0;
      const flashInterval = setInterval(() => {
        character.visible = !character.visible;
        flashes++;
        if (flashes > 10) {
          clearInterval(flashInterval);
          character.visible = true;
        }
      }, 150);
      if (game.lives <= 0) {
        game.gameOver = true;
        document.getElementById('finalScore').textContent = game.score;
        document.getElementById('gameOver').classList.add('show');
      }
    }
  }

  // ── Update Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.position.x += p.userData.vx * dt;
    p.position.y += p.userData.vy * dt;
    p.position.z += p.userData.vz * dt;
    p.userData.vy -= 0.001 * dt;
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      particles.splice(i, 1);
    }
  }

  // ── Camera Follow ──
  _v3.set(
    character.position.x,
    character.position.y + 300,
    character.position.z - 600
  );
  camera.position.lerp(_v3, 0.05);
  camera.lookAt(character.position);

  renderer.render(scene, camera);
  requestAnimationFrame(update);
}

// ─── Start ─────────────────────────────────────────────────────
update();
updateUI();
</script>
